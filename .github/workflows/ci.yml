name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Run tests
        run: uv run python -m pytest tests/ -q

      - name: Type check
        run: uv run python -m mypy ui_clone/

      - name: Lint check
        run: uv run python -m ruff check ui_clone/ tests/

      - name: Shell syntax check
        run: |
          for f in scripts/*.sh hooks/*.sh skills/visual-debug/scripts/*.sh; do
            bash -n "$f" || exit 1
          done

      - name: Review checks
        run: bash scripts/review.sh

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pre-push security gate
        run: bash scripts/pre-push-security.sh

  socket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SocketDev/action@v1
        with:
          mode: firewall-free

  snyk:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Snyk Open Source scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
